apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-deployment
  namespace: lgcns
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-pod
  
  template:
    metadata:
      labels:
        app: rabbitmq-pod
    
    spec:
      containers:
        - name: rabbitmq-container
          image: rabbitmq:3-management
          ports:
          - containerPort: 5672
          - containerPort: 15672

---

# core service setting
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: lgcns

spec: 
  type: ClusterIP
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672

  - name: management
    port: 15672
    targetPort: 15672

  selector:
    app: rabbitmq-pod