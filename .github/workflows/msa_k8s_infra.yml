name: msa eks infra deploy

on:
  workflow_dispatch:

jobs:

  # job name
  deploy_infra:
    
    #runner
    runs-on: ubuntu-latest

    #step에서 사용하는 명령어 볼 수 있는 사이트 https://docs.github.com/ko/actions
    steps:
      # 소스코드 check out
      - name: checkout github
        uses: actions/checkout@v2

      # 리눅스 환경에서 kubectl client 설치
      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.34.1"
      
      # git 레포마다 secret 설정이 달라짐, aws 인증 
      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET}}
          aws-region: us-west-2

      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region us-west-2 --name lgcns-syjeong-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1 
      
      # Ingress Controller 적용
      - name: deploy ingress
        run: |
          kubectl apply -f ./k8s/msa_ingress.yml

      # Zookeeper 배포
      - name: deploy zookeeper
        run: |
          kubectl apply -f ./k8s/msa_zookeeper.yml

      # Kafka 배포
      - name: deploy kafka
        run: |
          kubectl apply -f ./k8s/msa_kafka.yml

      # Redis 배포
      - name: deploy redis
        run: |
          kubectl apply -f ./k8s/msa_redis.yml

      # RabbitMQ 배포
      - name: deploy rabbitmq
        run: |
          kubectl apply -f ./k8s/msa_rabbitmq.yml

      # 배포 확인
      - name: check pods
        run: |
          kubectl get pods -n lgcns

      - name: check services
        run: |
          kubectl get svc -n lgcns